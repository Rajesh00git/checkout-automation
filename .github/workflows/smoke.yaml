name: Smoke Tests CI
on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    
    - name: Install system dependencies for Playwright
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-color-emoji fonts-dejavu-core libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libdrm2 libegl1 libexpat1 libffi8 libfontconfig1 libfreetype6 libgbm1 libgcc-s1 libglib2.0-0 libgtk-3-0 libharfbuzz0b libicu72 libjpeg-turbo-progs libnss3 libpango-1.0-0 libpango-cairo-1.0-0 libpangoft2-1.0-0 libssl3 libstdc++6 libx11-6 libx11-xcb1 libxcab1 libxcomposite1 libxcursor1 libxdamage1 libxdmcp6 libxext6 libxfixes3 libxi6 libxinerama1 libxkbcommon0 libxrandr2 libxrender1 libxshmfence1 libxss1 libxt6 libxtst6 libxvmc1 libxkbcommon-x11-0
    
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    
    - name: Install Playwright browsers with system dependencies
      run: python -m playwright install --with-deps ${{ matrix.browser }}
    
    - name: Run smoke tests
      run: pytest tests/ -m smoke --html=report.html --self-contained-html -v -s
    
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report-${{ matrix.browser }}
        path: report.html
