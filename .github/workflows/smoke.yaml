name: Smoke Tests CI
on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    
    - name: Install system dependencies for Playwright
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatspi2.0-0 libxrandr2 libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libcups2 libdrm2 libgbm1 libxshmfence1
    
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    
    - name: Install Playwright browsers with system dependencies
      run: python -m playwright install --with-deps ${{ matrix.browser }}
    
    - name: Run smoke tests
      run: pytest tests/ -m smoke --html=report.html --self-contained-html -v -s
    
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report-${{ matrix.browser }}
        path: report.html
